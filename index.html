<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuctionHouse</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #0e0c0a;
      --parchment:  #f5f0e8;
      --gold:       #b8922a;
      --gold-dim:   #d4b96a;
      --dust:       #e8e0d0;
      --dust-dark:  #d0c8b8;
      --shadow:     rgba(14,12,10,0.12);
      --red:        #8b3a3a;
      --red-bg:     #fff5f5;
      --red-border: #f0d0d0;
      --green:      #2d6a4f;
      --green-bg:   #f0faf5;
      --green-border:#b7e4c7;
      --serif:      'Cormorant Garamond', Georgia, serif;
      --mono:       'DM Mono', monospace;
    }

    html, body { min-height: 100vh; background: var(--parchment); color: var(--ink); font-family: var(--serif); font-size: 18px; line-height: 1.6; }

    /* top border */
    body::after { content: ''; display: block; position: fixed; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); z-index: 100; }

    /* ── VIEWS ── */
    .view { display: none; }
    .view.active { display: block; }

    /* ── PAGE SHELL ── */
    .page { max-width: 760px; margin: 0 auto; padding: 72px 32px 96px; }
    .page-wide { max-width: 900px; margin: 0 auto; padding: 72px 32px 96px; }

    /* ── NAV BAR ── */
    .topbar {
      position: fixed; top: 3px; left: 0; right: 0; z-index: 90;
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 32px;
      background: rgba(245,240,232,0.92); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--dust);
    }
    .topbar-brand { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); }
    .topbar-right { display: flex; align-items: center; gap: 20px; }
    .topbar-user { font-family: var(--mono); font-size: 0.62rem; color: #8a7e70; letter-spacing: 0.08em; }
    .topbar-user strong { color: var(--ink); }
    .topbar-link { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); cursor: pointer; text-decoration: none; border: none; background: none; padding: 0; transition: color 0.15s; }
    .topbar-link:hover { color: var(--ink); }
    .topbar-link.active { color: var(--ink); border-bottom: 1px solid var(--ink); }

    /* ── HEADER ── */
    header { text-align: center; margin-bottom: 56px; animation: fadeUp 0.7s ease both; }
    .eyebrow { font-family: var(--mono); font-size: 0.65rem; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
    h1 { font-size: clamp(2.4rem, 6vw, 3.6rem); font-weight: 300; letter-spacing: -0.01em; line-height: 1.1; }
    h1 em { font-style: italic; color: var(--gold); }
    .subtitle { margin-top: 16px; font-size: 1rem; font-weight: 300; color: #6b6050; font-style: italic; }

    /* ── CARDS ── */
    .card {
      background: #fff; border: 1px solid var(--dust); border-radius: 2px;
      padding: 36px 40px; box-shadow: 0 4px 32px var(--shadow);
      animation: fadeUp 0.7s 0.1s ease both; position: relative;
    }
    .card::before { display: none; }

    /* ── TYPOGRAPHY ── */
    .section-title { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
    h2 { font-size: 1.6rem; font-weight: 300; margin-bottom: 24px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 20px; }
    label { display: block; font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }

    input[type="text"], input[type="password"], select {
      width: 100%; font-family: var(--mono); font-size: 0.78rem; font-weight: 300;
      color: var(--ink); background: var(--parchment); border: 1px solid var(--dust);
      border-radius: 1px; padding: 13px 16px; outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: #b0a898; }
    input:focus, select:focus { border-color: var(--gold-dim); box-shadow: 0 0 0 3px rgba(184,146,42,0.1); }

    .input-row { display: flex; gap: 12px; align-items: stretch; }
    .input-row input { flex: 1; }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.18em;
      text-transform: uppercase; font-weight: 400; border: none; border-radius: 1px;
      padding: 13px 28px; cursor: pointer; transition: background 0.2s, transform 0.1s;
      white-space: nowrap; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { color: var(--parchment); background: var(--ink); }
    .btn-primary:hover:not(:disabled) { background: #2a2520; }
    .btn-ghost { color: var(--ink); background: transparent; border: 1px solid var(--dust); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--dust-dark); background: var(--parchment); }
    .btn-danger { color: #fff; background: #8b3a3a; }
    .btn-danger:hover:not(:disabled) { background: #6e2e2e; }
    .btn-sm { padding: 7px 16px; font-size: 0.58rem; }
    .btn-full { width: 100%; justify-content: center; }

    .spinner-el { width: 11px; height: 11px; border: 1.5px solid rgba(255,255,255,0.35); border-top-color: currentColor; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn.loading .spinner-el { display: inline-block; }

    /* ── MESSAGES ── */
    .msg { border-radius: 1px; padding: 14px 18px; font-size: 0.88rem; font-style: italic; margin-top: 16px; display: none; }
    .msg.visible { display: block; }
    .msg-error   { background: var(--red-bg); border: 1px solid var(--red-border); color: var(--red); }
    .msg-success { background: var(--green-bg); border: 1px solid var(--green-border); color: var(--green); }

    /* ── DIVIDER ── */
    .divider { display: flex; align-items: center; gap: 16px; margin: 48px 0 40px; opacity: 0; transition: opacity 0.4s; }
    .divider.visible { opacity: 1; }
    .divider-line { flex: 1; height: 1px; background: var(--dust); }
    .divider-icon { font-size: 1rem; color: var(--gold-dim); }

    /* ── RESULT ── */
    #result { opacity: 0; transform: translateY(16px); transition: opacity 0.5s ease, transform 0.5s ease; }
    #result.visible { opacity: 1; transform: translateY(0); }
    .price-hero { text-align: center; margin-bottom: 48px; }
    .price-label { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
    .price-value { font-size: clamp(2.8rem, 8vw, 4.8rem); font-weight: 300; letter-spacing: -0.02em; line-height: 1; }
    .price-range { margin-top: 10px; font-family: var(--mono); font-size: 0.7rem; color: #9a8e80; }
    .data-grid { display: flex; flex-direction: column; gap: 1px; background: var(--dust); border: 1px solid var(--dust); margin-bottom: 32px; }
    .data-cell { background: #fff; padding: 20px 24px; text-align: center; }
    .data-cell.full { }
    .cell-label { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
    .cell-value { font-size: 1.05rem; font-weight: 400; line-height: 1.3; }
    .cell-value.italic { font-style: italic; }
    .score-badge { display: inline-flex; align-items: center; gap: 10px; }
    .score-number { font-size: 1.6rem; font-weight: 300; color: var(--gold); line-height: 1; }
    .score-bar-wrap { flex: 1; height: 3px; background: var(--dust); border-radius: 2px; min-width: 80px; }
    .score-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 1s cubic-bezier(0.4,0,0.2,1); width: 0%; }
    .model-meta { font-family: var(--mono); font-size: 0.62rem; color: #9a8e80; letter-spacing: 0.06em; line-height: 1.8; border-top: 1px solid var(--dust); padding-top: 20px; }
    .model-meta span { color: var(--ink); }

    /* ── LOGIN SPECIFIC ── */
    #view-login .page { max-width: 440px; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding-top: 0; padding-bottom: 0; }
    /* ── LOGIN LOGO ── */
    .login-logo {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 300;
      font-style: italic;
      color: var(--gold);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: -0.01em;
      animation: fadeUp 0.6s ease both;
    }


    /* ── ADMIN ── */
    .admin-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    .user-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .user-table th { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--dust); font-weight: 400; }
    .user-table td { padding: 13px 14px; border-bottom: 1px solid var(--dust); vertical-align: middle; }
    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: var(--parchment); }
    .role-badge { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 3px 8px; border-radius: 1px; }
    .role-admin { background: #fef3e2; color: var(--gold); border: 1px solid #f5d9a0; }
    .role-user  { background: var(--parchment); color: #7a6e60; border: 1px solid var(--dust); }
    .td-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* Modal */
    .modal-backdrop { position: fixed; inset: 0; background: rgba(14,12,10,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-backdrop.open { opacity: 1; pointer-events: all; }
    .modal { background: #fff; border: 1px solid var(--dust); border-radius: 2px; padding: 36px 40px; width: 100%; max-width: 440px; box-shadow: 0 16px 64px rgba(14,12,10,0.2); transform: translateY(12px); transition: transform 0.2s; position: relative; }
    .modal-backdrop.open .modal { transform: translateY(0); }
    .modal::before { display: none; }
    .modal-title { font-size: 1.3rem; font-weight: 300; margin-bottom: 24px; }
    .modal-footer { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
    .mono-date { font-family: var(--mono); font-size: 0.68rem; color: #9a8e80; }

    /* ── ANIMATIONS ── */
    .tab-btn {
flex:1;font-family:var(--mono);font-size:0.62rem;letter-spacing:0.14em;
text-transform:uppercase;padding:10px;border:none;cursor:pointer;
transition:background 0.2s,color 0.2s;
min-width:0;box-sizing:border-box;
}
.tab-active { background:var(--ink) !important;color:var(--parchment) !important; }
.tab-inactive { background:var(--parchment) !important;color:#9a8e80 !important; }
.tab-inactive:hover { background:var(--dust) !important;color:var(--ink) !important; }
.data-grid-wrap {
    position: relative;
    margin-bottom: 32px;
}
.data-grid-wrap::before,
.data-grid-wrap::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    height: 40px;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    transition: opacity 0.3s;
}
.data-grid-wrap::before {
    top: 0;
    background: linear-gradient(to bottom, rgba(245,240,232,0.9), transparent);
}
.data-grid-wrap::after {
    bottom: 0;
    background: linear-gradient(to top, rgba(245,240,232,0.9), transparent);
}
.data-grid-wrap.fade-top::before { opacity: 1; }
.data-grid-wrap.fade-bottom::after { opacity: 1; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }

    /* ── RESPONSIVE ── */
    @media (max-width: 560px) {
      .page, .page-wide { padding: 64px 18px 72px; }
      .card { padding: 24px 20px; }
      .topbar { padding: 10px 18px; }
      .data-grid { grid-template-columns: 1fr; }
      .data-cell.full { grid-column: 1; }
      .user-table th:nth-child(3), .user-table td:nth-child(3),
      .user-table th:nth-child(4), .user-table td:nth-child(4) { display: none; }
    }
  
.monte-wrap {
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--dust);
}
.monte-title {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
}
.monte-canvas-wrap {
    position: relative;
    width: 100%;
    height: 160px;
}
.monte-tooltip {
    position: absolute;
    background: var(--ink);
    color: var(--parchment);
    font-family: var(--mono);
    font-size: 0.62rem;
    padding: 6px 12px;
    border-radius: 2px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
    transform: translateX(-50%);
    z-index: 10;
}
.monte-axis {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: var(--mono);
    font-size: 0.55rem;
    color: #9a8e80;
}

.comp-wrap {
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid var(--dust);
}
.comp-title {
    font-family: var(--mono);
    font-size: 0.58rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 16px;
}
.comp-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
}
.comp-table th {
    font-family: var(--mono);
    font-size: 0.52rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #9a8e80;
    text-align: left;
    padding: 6px 12px;
    border-bottom: 1px solid var(--dust);
}
.comp-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--dust);
    font-family: var(--serif);
    color: var(--ink);
}
.comp-table tr:last-child td { border-bottom: none; }
.comp-table tr:hover td { background: var(--cream); }
.comp-price {
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--ink);
    font-weight: 600;
}
.comp-loading {
    font-family: var(--mono);
    font-size: 0.62rem;
    color: #9a8e80;
    padding: 12px 0;
}

.portfolio-wrap { max-width: 780px; margin: 0 auto; padding: 40px 24px; }
.portfolio-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; }
.portfolio-total { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.15em; color: var(--gold); }
.portfolio-total span { font-size: 1.1rem; color: var(--ink); }
.portfolio-empty { font-family: var(--mono); font-size: 0.7rem; color: #9a8e80; text-align: center; padding: 60px 0; }
.portfolio-item {
    border: 1px solid var(--dust);
    background: #fff;
    padding: 20px 24px;
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
}
.portfolio-item:hover { border-color: #c8b89a; }
.portfolio-item-info { flex: 1; }
.portfolio-item-title { font-family: var(--serif); font-size: 1.05rem; font-style: italic; margin-bottom: 4px; }
.portfolio-item-artist { font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.12em; color: #9a8e80; text-transform: uppercase; }
.portfolio-item-price { font-family: var(--mono); font-size: 0.9rem; color: var(--ink); text-align: right; white-space: nowrap; }
.portfolio-item-range { font-family: var(--mono); font-size: 0.55rem; color: #9a8e80; text-align: right; margin-top: 3px; }
.portfolio-delete { background: none; border: none; cursor: pointer; color: #c8b89a; font-size: 1rem; padding: 4px 8px; }
.portfolio-delete:hover { color: #8b0000; }
.portfolio-add-btn {
    width: 100%;
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 14px;
    background: var(--ink);
    color: var(--parchment);
    border: none;
    cursor: pointer;
    margin-top: 8px;
}
.portfolio-add-btn:hover { background: #2a2a2a; }

.img-upload-wrap {
    border: 1.5px dashed var(--dust);
    border-radius: 2px;
    padding: 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 20px;
    position: relative;
}
.img-upload-wrap:hover, .img-upload-wrap.dragover {
    border-color: var(--gold);
    background: rgba(184,146,42,0.04);
}
.img-upload-label {
    font-family: var(--mono);
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9a8e80;
}
.img-upload-sub {
    font-family: var(--mono);
    font-size: 0.55rem;
    color: #b8a898;
    margin-top: 6px;
}
.img-preview {
    max-width: 100%;
    max-height: 240px;
    margin: 0 auto 16px;
    display: block;
    border: 1px solid var(--dust);
}
.img-identified {
    background: var(--cream);
    border: 1px solid var(--dust);
    padding: 14px 18px;
    margin-bottom: 16px;
    font-family: var(--mono);
    font-size: 0.62rem;
}
.img-identified-title {
    font-family: var(--serif);
    font-size: 1rem;
    font-style: italic;
    color: var(--ink);
    margin-bottom: 4px;
}
.img-identified-artist {
    color: #9a8e80;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-size: 0.55rem;
}
.img-confidence-high { color: #4a7c4a; }
.img-confidence-low { color: #8b4a2a; }
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════ LOGIN VIEW ══ -->
<div id="view-login" class="view active">
  <div class="page">
    <div class="login-logo">AuctionHouse</div>
    <div class="card">
      <div class="field">
        <label for="login-user">Username</label>
        <input type="text" id="login-user" autocomplete="username" autocapitalize="none" spellcheck="false" placeholder="your username" />
      </div>
      <div class="field">
        <label for="login-pass">Password</label>
        <input type="password" id="login-pass" autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button class="btn btn-primary btn-full" id="login-btn" onclick="doLogin()">
        <span class="spinner-el"></span>
        <span class="btn-text">Sign In</span>
      </button>
      <div class="msg msg-error" id="login-err"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════════════ TOPBAR (shared) ══ -->
<nav class="topbar" id="topbar" style="display:none">
  <span class="topbar-brand">AuctionHouse</span>
  <div class="topbar-right">
    <button class="topbar-link" id="nav-estimator" onclick="showView('app')">Estimator</button>
    <button class="topbar-link" id="nav-admin"     onclick="showView('admin')" style="display:none">Admin</button>
    <span class="topbar-user">Signed in as <strong id="topbar-username"></strong></span>
    <button class="topbar-link" onclick="doLogout()">Sign out</button>
  </div>
</nav>

<!-- ══════════════════════════════════════════════════ ESTIMATOR VIEW ══ -->
<div id="view-app" class="view">
  <div class="page" style="padding-top:100px">
    <header>
            <h1>Auction<em>House</em></h1>
          </header>

    <div class="card">
      <!-- Mode toggle -->
      <div style="display:flex;gap:0;margin-bottom:28px;border:1px solid var(--dust);border-radius:1px;overflow:hidden">
        <button id="tab-wiki" onclick="setMode('wiki')" class="tab-btn tab-active">
          Wikipedia URL
        </button>
        <button id="tab-manual" onclick="setMode('manual')" class="tab-btn tab-inactive">
                Manual Entry
                </button>
                <button id="tab-image" onclick="setMode('image')" class="tab-btn tab-inactive">
          Manual Entry
        </button>
      </div>

      <!-- Wikipedia mode -->
      <div id="mode-wiki">
        <div class="field">
          <label for="wiki-url">Wikipedia Article URL</label>
          <div class="input-row">
            <input type="text" id="wiki-url"
              placeholder="https://en.wikipedia.org/wiki/The_Starry_Night"
              autocomplete="off" spellcheck="false" />
          </div>
        </div>
      </div>

      <!-- Manual mode -->
      <div id="mode-manual" style="display:none">
        <div class="field">
          <label for="m-title">Artwork Title</label>
          <input type="text" id="m-title" placeholder="e.g. Portrait of Dr. Gachet" autocomplete="off" />
        </div>
        <div class="field">
          <label for="m-artist">Artist Name</label>
          <input type="text" id="m-artist" placeholder="e.g. Vincent van Gogh" autocomplete="off" />
        </div>
        <div class="field">

<!-- ══════════════════════════════════════════════ CREATE USER MODAL ══ -->
<div class="modal-backdrop" id="modal-create">
  <div class="modal">
    <p class="modal-title">New User</p>

      </button>

  </div>
</div>

<!-- ════════════════════════════════════════════ RESET PASSWORD MODAL ══ -->
<div class="modal-backdrop" id="modal-reset">
  <div class="modal">
    <p class="modal-title">Reset Password</p>
    <p style="font-size:0.9rem;color:#6b6050;font-style:italic;margin-bottom:20px">

      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-reset')">Cancel</button>

        <span class="btn-text">Set Password</span>

<!-- ══════════════════════════════════════════════ DELETE CONFIRM MODAL ══ -->
<div class="modal-backdrop" id="modal-delete">
  <div class="modal">
    <p class="modal-title">Delete User</p>
    <p style="font-size:0.95rem;margin-bottom:24px">
      Are you sure you want to delete <strong id="delete-username-label"></strong>?
      This cannot be undone.
    </p>
    <div class="msg msg-error" id="delete-err"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-delete')">Cancel</button>
      <button class="btn btn-danger btn-sm" id="delete-btn" onclick="deleteUser()">
        <span class="spinner-el"></span>
        <span class="btn-text">Delete</span>
      </button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
const API = "https://auctionhouse-ht15.onrender.com";
let TOKEN    = localStorage.getItem("ae_token")    || null;
let USERNAME = localStorage.getItem("ae_username") || null;
let ROLE     = localStorage.getItem("ae_role")     || null;
let pendingDeleteId = null;
let pendingResetId  = null;

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", async () => {
  // Enter key on login
  ["login-user","login-pass"].forEach(id =>
    document.getElementById(id).addEventListener("keydown", e => { if (e.key==="Enter") doLogin(); })
  );
  document.getElementById("wiki-url").addEventListener("keydown", e => { if (e.key==="Enter") runEstimate(); });
  ["m-title","m-artist","m-artist-wiki","m-decade","m-width","m-height","m-depth"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keydown", e => { if (e.key==="Enter") runEstimate(); });
  });

  if (TOKEN) {
    // Verify token still valid
    try {
      const r = await apiFetch("/api/me");
      if (r.ok) {
        const d = await r.json();
        USERNAME = d.username; ROLE = d.role;
        enterApp();
        return;
      }
    } catch(e) {}
    clearAuth();
  }
  showView("login");
});

// ═══════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════
async function doLogin() {
  const btn  = document.getElementById("login-btn");
  const err  = document.getElementById("login-err");
  const user = document.getElementById("login-user").value.trim();
  const pass = document.getElementById("login-pass").value;
  err.className = "msg msg-error";
  if (!user || !pass) { showMsg(err, "Please enter your username and password."); return; }

  setLoading(btn, true);
  try {
    const r = await fetch(API + "/api/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username:user, password:pass})
    });
    const d = await r.json();
    if (!r.ok) { showMsg(err, d.error || "Login failed."); return; }
    TOKEN    = d.token;
    USERNAME = d.username;
    ROLE     = d.role;
    localStorage.setItem("ae_token",    TOKEN);
    localStorage.setItem("ae_username", USERNAME);
    localStorage.setItem("ae_role",     ROLE);
    enterApp();
  } catch(e) {
    showMsg(err, "Cannot reach server. Is app.py running?");
  } finally {
    setLoading(btn, false);
  }
}

function doLogout() {
  clearAuth();
  showView("login");
  document.getElementById("login-user").value = "";
  document.getElementById("login-pass").value = "";
}

function clearAuth() {
  TOKEN = USERNAME = ROLE = null;
  localStorage.removeItem("ae_token");
  localStorage.removeItem("ae_username");
  localStorage.removeItem("ae_role");
}

function enterApp() {
  document.getElementById("topbar").style.display = "flex";
  document.getElementById("topbar-username").textContent = USERNAME;
  if (ROLE === "admin") {
    document.getElementById("nav-admin").style.display = "inline";
  }
  showView("app");
}

// ═══════════════════════════════════════════════════
// VIEW ROUTING
// ═══════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById("view-" + name).classList.add("active");
  document.querySelectorAll(".topbar-link[id^='nav-']").forEach(l => l.classList.remove("active"));
  const nav = document.getElementById("nav-" + name);
  if (nav) nav.classList.add("active");
  if (name === "admin") loadUsers();
  if (name === "login") document.getElementById("topbar").style.display = "none";
}

// ═══════════════════════════════════════════════════
// ESTIMATOR
// ═══════════════════════════════════════════════════
let currentMode = "wiki";

function setMode(mode) {
  currentMode = mode;
  document.getElementById("mode-wiki").style.display = mode === "wiki" ? "block" : "none";
  document.getElementById("mode-manual").style.display = mode === "manual" ? "block" : "none";
  const imgDiv = document.getElementById("mode-image");
  if (imgDiv) imgDiv.style.display = mode === "image" ? "block" : "none";
  document.getElementById("tab-wiki").className = "tab-btn " + (mode === "wiki" ? "tab-active" : "tab-inactive");
  document.getElementById("tab-manual").className = "tab-btn " + (mode === "manual" ? "tab-active" : "tab-inactive");
  const imgTab = document.getElementById("tab-image");
  if (imgTab) imgTab.className = "tab-btn " + (mode === "image" ? "tab-active" : "tab-inactive");
}

async function runEstimate() {
  if (currentMode === "image") { runImageEstimate(); return; }
  const btn = document.getElementById("estimate-btn");
  const err = document.getElementById("estimate-err");
  err.className = "msg msg-error";
  document.getElementById("result").className = "";
  document.getElementById("divider").className = "divider";

  let endpoint, payload;

  if (currentMode === "wiki") {
    const url = document.getElementById("wiki-url").value.trim();
    if (!url) { showMsg(err, "Please paste a Wikipedia URL."); return; }
    if (!url.includes("wikipedia.org/wiki/")) { showMsg(err, "That doesn't look like a Wikipedia article URL."); return; }
    endpoint = "/api/estimate";
    payload  = {url};
  } else {
    const artist = document.getElementById("m-artist").value.trim();
    if (!artist) { showMsg(err, "Artist name is required."); return; }
    const decadeRaw = document.getElementById("m-decade").value.trim();
    const decade = decadeRaw ? parseInt(decadeRaw) : null;
    if (decadeRaw && isNaN(decade)) { showMsg(err, "Decade must be a number e.g. 1880."); return; }
    const artistWiki = document.getElementById("m-artist-wiki").value.trim();
    const artistWikiTitle = artistWiki.includes("wikipedia.org/wiki/")
      ? decodeURIComponent(artistWiki.split("/wiki/")[1]).replace(/_/g, " ")
      : null;
    endpoint = "/api/estimate-manual";
    payload  = {
      title:            document.getElementById("m-title").value.trim() || "Untitled",
      artist_name:      artist,
      artist_wiki_title: artistWikiTitle,
      decade:           decade,
      medium:           document.getElementById("m-medium").value,
      width_cm:         parseFloat(document.getElementById("m-width").value)  || null,
      height_cm:        parseFloat(document.getElementById("m-height").value) || null,
      depth_cm:         parseFloat(document.getElementById("m-depth").value)  || null,
    };
  }

  setLoading(btn, true);
  btn.querySelector(".btn-text").textContent = "Analysing…";
  try {
    const r = await apiFetch(endpoint, "POST", payload);
    const d = await r.json();
    if (!r.ok) {
      if (r.status === 401) { doLogout(); return; }
      showMsg(err, d.error || "Something went wrong.");
      return;
    }
    renderResult(d);
  } catch(e) {
    showMsg(err, "Could not reach the server.");
  } finally {
    setLoading(btn, false);
    btn.querySelector(".btn-text").textContent = "Estimate";
  }
}

function renderResult(d) {
  const a  = d.artwork, mi = d.model_info;
  const [lo, hi] = d.confidence_interval;
  let dims = "—";
  if (a.width_cm) {
    dims = `${a.width_cm} × ${a.height_cm} cm`;
    if (a.depth_cm) dims += ` × ${a.depth_cm} cm (3D)`;
  }
  const sv  = d.artist_score || 0;
  const pct = ((sv - 1) / 9 * 100).toFixed(1);

  document.getElementById("result").innerHTML = `
    <div class="price-hero">
      <div class="price-label">Estimated Auction Price</div>
      <div class="price-value">${fmt(d.estimated_price_usd)}</div>
      <div class="price-range">Range &nbsp;${fmt(lo)} — ${fmt(hi)}</div>
    </div>
    <div class="data-grid">
      <div class="data-cell full"><div class="cell-label">Title</div><div class="cell-value italic">${esc(a.title)||"—"}</div></div>
      <div class="data-cell"><div class="cell-label">Artist</div><div class="cell-value">${esc(a.artist)||"—"}</div></div>
      
        </div>
      </div>
      <div class="data-cell"><div class="cell-label">Decade Created</div><div class="cell-value">${a.decade ? a.decade+"s" : "—"}</div></div>
      <div class="data-cell"><div class="cell-label">Medium</div><div class="cell-value">${esc(a.medium)||"—"}</div></div>
      <div class="data-cell"><div class="cell-label">Dimensions</div><div class="cell-value">${dims}</div></div>
    </div>`;

  document.getElementById("divider").classList.add("visible");
    // Append Monte Carlo chart
    const compHtml = `
        <div class="comp-wrap" style="margin-top:32px;padding-top:28px;border-top:1px solid var(--dust)">
            <div class="comp-title">Comparable Sales</div>
            <div id="comp-wrap"></div>
        </div>
    `;
    document.getElementById("result").innerHTML += compHtml;
    // Store result globally for portfolio
    window._lastEstimate = d;
    const portfolioBtnHtml = `
        <div style="margin-top:16px;text-align:center">
            <button class="portfolio-add-btn" onclick="addToPortfolio(window._lastEstimate)">
                + ADD TO PORTFOLIO
            </button>
        </div>
    `;
    document.getElementById("result").innerHTML += portfolioBtnHtml;
    const monteHtml = `
        <div class="monte-wrap">
            <div class="monte-title">Monte Carlo Price Distribution — 10,000 Simulations</div>
            <div class="monte-canvas-wrap" id="monte-canvas-wrap">
                <div class="monte-tooltip" id="monte-tooltip"></div>
            </div>
            <div class="monte-axis" id="monte-axis"></div>
        </div>
    `;
    document.getElementById("result").innerHTML += monteHtml;
  requestAnimationFrame(() => {
    document.getElementById("result").classList.add("visible");
    setTimeout(() => {
        runMonteCarlo(d.estimated_price_usd, d.model_info.model_mae_usd || d.estimated_price_usd * 0.4);
        loadComparables(d.model_info.score_band, d.artwork.medium, d.artwork.decade, d.artwork.title);
    }, 200);
  });
}

// ═══════════════════════════════════════════════════
// ADMIN — USER TABLE
// ═══════════════════════════════════════════════════
async function loadUsers() {
  const tbody = document.getElementById("user-tbody");
  tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:#9a8e80;font-style:italic;font-family:var(--mono);font-size:0.75rem">Loading…</td></tr>`;
  try {
    const r = await apiFetch("/api/users");
    if (!r.ok) { if (r.status===401) doLogout(); return; }
    const users = await r.json();
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:32px;color:#9a8e80;font-style:italic;font-family:var(--mono);font-size:0.75rem">No users yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = users.map(u => `
      <tr data-id="${u.id}">
        <td>${esc(u.username)}</td>
        <td><span class="role-badge role-${u.role}">${u.role}</span></td>
        <td class="mono-date">${fmtDate(u.created_at)}</td>
        <td class="mono-date">${fmtDate(u.last_login) || "never"}</td>
        <td>
          <div class="td-actions">
            <button class="btn btn-ghost btn-sm" onclick="openResetModal(${u.id},'${esc(u.username)}')">Reset PW</button>
            <button class="btn btn-danger btn-sm" onclick="openDeleteModal(${u.id},'${esc(u.username)}')">Delete</button>
          </div>
        </td>
      </tr>`).join("");
  } catch(e) {
    document.getElementById("admin-err").textContent = "Could not load users.";
    document.getElementById("admin-err").classList.add("visible");
  }
}

// ═══════════════════════════════════════════════════
// ADMIN — CREATE USER
// ═══════════════════════════════════════════════════
function openCreateModal() {
  document.getElementById("new-username").value = "";
  document.getElementById("new-password").value = "";

  clearMsg("create-err");
  openModal("modal-create");
  setTimeout(() => document.getElementById("new-username").focus(), 120);
}

async function createUser() {
  const btn  = document.getElementById("create-btn");
  const err  = document.getElementById("create-err");
  clearMsg("create-err");
  const un = document.getElementById("new-username").value.trim();
  const pw = document.getElementById("new-password").value;

  if (!un || !pw) { showMsg(err, "All fields are required."); return; }

  setLoading(btn, true);
  try {
    const r = await apiFetch("/api/users", "POST", {username:un, password:pw});
    const d = await r.json();
    if (!r.ok) { showMsg(err, d.error || "Failed to create user."); return; }
    closeModal("modal-create");
    showAdminSuccess(`User "${un}" created successfully.`);
    loadUsers();
  } catch(e) {
    showMsg(err, "Server error.");
  } finally {
    setLoading(btn, false);
  }
}

// ═══════════════════════════════════════════════════
// ADMIN — RESET PASSWORD
// ═══════════════════════════════════════════════════
function openResetModal(id, username) {
  pendingResetId = id;
  document.getElementById("reset-username-label").textContent = username;
  document.getElementById("reset-password").value = "";
  clearMsg("reset-err");
  openModal("modal-reset");
  setTimeout(() => document.getElementById("reset-password").focus(), 120);
}

async function resetPassword() {
  const btn = document.getElementById("reset-btn");
  const err = document.getElementById("reset-err");
  clearMsg("reset-err");
  const pw = document.getElementById("reset-password").value;
  if (!pw) { showMsg(err, "Please enter a new password."); return; }

  setLoading(btn, true);
  try {
    const r = await apiFetch(`/api/users/${pendingResetId}/password`, "PATCH", {password:pw});
    const d = await r.json();
    if (!r.ok) { showMsg(err, d.error || "Failed."); return; }
    closeModal("modal-reset");
    showAdminSuccess("Password updated successfully.");
  } catch(e) {
    showMsg(err, "Server error.");
  } finally {
    setLoading(btn, false);
  }
}

// ═══════════════════════════════════════════════════
// ADMIN — DELETE USER
// ═══════════════════════════════════════════════════
function openDeleteModal(id, username) {
  pendingDeleteId = id;
  document.getElementById("delete-username-label").textContent = username;
  clearMsg("delete-err");
  openModal("modal-delete");
}

async function deleteUser() {
  const btn = document.getElementById("delete-btn");
  const err = document.getElementById("delete-err");
  clearMsg("delete-err");

  setLoading(btn, true);
  try {
    const r = await apiFetch(`/api/users/${pendingDeleteId}`, "DELETE");
    const d = await r.json();
    if (!r.ok) { showMsg(err, d.error || "Failed to delete."); return; }
    closeModal("modal-delete");
    showAdminSuccess("User deleted.");
    loadUsers();
  } catch(e) {
    showMsg(err, "Server error.");
  } finally {
    setLoading(btn, false);
  }
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function apiFetch(path, method="GET", body=null) {
  const opts = { method, headers: {"Content-Type":"application/json", "Authorization":"Bearer " + TOKEN} };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API + path, opts);
}

function openModal(id)  { document.getElementById(id).classList.add("open"); }
function closeModal(id) { document.getElementById(id).classList.remove("open"); }

// Close modal on backdrop click
document.querySelectorAll(".modal-backdrop").forEach(bd =>
  bd.addEventListener("click", e => { if (e.target === bd) bd.classList.remove("open"); })
);

function setLoading(btn, on) {
  btn.disabled = on;
  btn.classList.toggle("loading", on);
}

function showMsg(el, msg) {
  el.textContent = msg;
  el.classList.add("visible");
}
function clearMsg(id) {
  const el = document.getElementById(id);
  el.textContent = "";
  el.className = el.className.replace(" visible","");
}
function showAdminSuccess(msg) {
  const el = document.getElementById("admin-success");
  showMsg(el, msg);
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 3500);
}

function fmt(n) {
  if (n == null) return "—";
  return new Intl.NumberFormat("en-US", {style:"currency",currency:"USD",maximumFractionDigits:0}).format(n);
}
function esc(s) {
  if (!s) return "";
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function fmtDate(s) {
  if (!s) return null;
  try { return new Date(s).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"}); }
  catch(e) { return s; }
}

function runMonteCarlo(estimate, mae) {
    const N = 10000;
    const sigma = Math.log(1 + (mae || estimate * 0.4) / estimate);
    const mu = Math.log(estimate) - 0.5 * sigma * sigma;

    // Generate samples using Box-Muller
    const samples = [];
    for (let i = 0; i < N; i++) {
        const u1 = Math.random() || 1e-10;
        const u2 = Math.random();
        const z = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
        samples.push(Math.exp(mu + sigma * z));
    }
    samples.sort((a, b) => a - b);

    const minVal = samples[Math.floor(N * 0.02)];
    const maxVal = samples[Math.floor(N * 0.98)];
    const BINS = 50;
    const binSize = (maxVal - minVal) / BINS;
    const bins = new Array(BINS).fill(0);
    for (const s of samples) {
        if (s < minVal || s > maxVal) continue;
        const idx = Math.min(Math.floor((s - minVal) / binSize), BINS - 1);
        bins[idx]++;
    }
    const maxBin = Math.max(...bins);

    // Build SVG
    const W = 600, H = 120, PAD = 8;
    const barW = W / BINS;
    let bars = "";
    for (let i = 0; i < BINS; i++) {
        const h = Math.max(2, (bins[i] / maxBin) * (H - PAD));
        const x = i * barW;
        const y = H - h;
        const t = bins[i] / maxBin;
        let r, g, b;
        if (t < 0.4) {
            const s = t / 0.4;
            r = Math.round(220 + (180 - 220) * s);
            g = Math.round(100 + (40 - 100) * s);
            b = Math.round(30 + (40 - 30) * s);
        } else {
            const s = (t - 0.4) / 0.6;
            r = Math.round(180 + (100 - 180) * s);
            g = Math.round(40 + (30 - 40) * s);
            b = Math.round(40 + (160 - 40) * s);
        }
        bars += `<rect x="${x+0.5}" y="${y}" width="${barW-1}" height="${h}" fill="rgb(${r},${g},${b})" rx="1"/>`;
    }

    // Estimate line
    const estPct = (estimate - minVal) / (maxVal - minVal);
    const estX = Math.max(0, Math.min(W, estPct * W));
    const estLine = `<line x1="${estX}" y1="0" x2="${estX}" y2="${H}" stroke="rgba(184,146,42,0.9)" stroke-width="1.5" stroke-dasharray="4,3"/>`;

    const p10 = fmt(samples[Math.floor(N * 0.10)]);
    const p50 = fmt(samples[Math.floor(N * 0.50)]);
    const p90 = fmt(samples[Math.floor(N * 0.90)]);

    const wrap = document.getElementById("monte-canvas-wrap");
    wrap.innerHTML = `
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"
             style="width:100%;height:${H}px;display:block;overflow:visible">
            ${bars}${estLine}
        </svg>
        <div id="monte-tooltip" class="monte-tooltip"></div>
    `;

    // Axis
    document.getElementById("monte-axis").innerHTML =
        `<span>${fmt(minVal)}</span><span>p10 ${p10}</span><span>p50 ${p50}</span><span>p90 ${p90}</span><span>${fmt(maxVal)}</span>`;

    // Hover tooltip
    const svg = wrap.querySelector("svg");
    const tooltip = document.getElementById("monte-tooltip");
    svg.addEventListener("mousemove", (e) => {
        const rect = svg.getBoundingClientRect();
        const xPct = (e.clientX - rect.left) / rect.width;
        const price = minVal + xPct * (maxVal - minVal);
        const binIdx = Math.min(Math.floor(xPct * BINS), BINS - 1);
        const pct = ((bins[binIdx] / N) * 100).toFixed(2);
        tooltip.style.opacity = "1";
        tooltip.style.left = (e.clientX - rect.left) + "px";
        tooltip.style.top = "-28px";
        tooltip.textContent = `${fmt(price)}  —  ${pct}%`;
    });
    svg.addEventListener("mouseleave", () => { tooltip.style.opacity = "0"; });
}
    samples.sort((a, b) => a - b);

    // Build histogram
    const minVal = samples[Math.floor(N * 0.01)];
    const maxVal = samples[Math.floor(N * 0.99)];
    const BINS = 60;
    const binSize = (maxVal - minVal) / BINS;
    const bins = new Array(BINS).fill(0);
    for (const s of samples) {
        if (s < minVal || s > maxVal) continue;
        const idx = Math.min(Math.floor((s - minVal) / binSize), BINS - 1);
        bins[idx]++;
    }
    const maxBin = Math.max(...bins);

    // Draw canvas
    const wrap = document.getElementById("monte-canvas-wrap");
    wrap.innerHTML = "";
    const canvas = document.createElement("canvas");
    const W = wrap.getBoundingClientRect().width || wrap.offsetWidth || 680;
    const H = 140;
    canvas.width = W;
    canvas.height = H;
    canvas.style.width = "100%";
    canvas.style.height = H + "px";
    wrap.appendChild(canvas);
    const ctx = canvas.getContext("2d");

    // Draw bars with gradient color orange->red->purple
    const colors = bins.map((b, i) => {
        const t = b / maxBin; // 0=tail, 1=peak
        if (t < 0.4) {
            // orange to red
            const s = t / 0.4;
            const r = Math.round(220 + (180 - 220) * s);
            const g = Math.round(100 + (40 - 100) * s);
            const bl = Math.round(30 + (40 - 30) * s);
            return `rgb(${r},${g},${bl})`;
        } else {
            // red to purple
            const s = (t - 0.4) / 0.6;
            const r = Math.round(180 + (100 - 180) * s);
            const g = Math.round(40 + (30 - 40) * s);
            const bl = Math.round(40 + (160 - 40) * s);
            return `rgb(${r},${g},${bl})`;
        }
    });

    const barW = W / BINS;
    for (let i = 0; i < BINS; i++) {
        const h = (bins[i] / maxBin) * (H - 20);
        ctx.fillStyle = colors[i];
        ctx.beginPath();
        ctx.roundRect(i * barW + 1, H - h - 4, barW - 2, h, [2, 2, 0, 0]);
        ctx.fill();
    }

    // Draw estimate line
    const estX = ((estimate - minVal) / (maxVal - minVal)) * W;
    if (estX > 0 && estX < W) {
        ctx.strokeStyle = "rgba(184,146,42,0.8)";
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(estX, 0);
        ctx.lineTo(estX, H);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    // Axis labels
    const axisEl = document.getElementById("monte-axis");
    const p10 = samples[Math.floor(N * 0.10)];
    const p50 = samples[Math.floor(N * 0.50)];
    const p90 = samples[Math.floor(N * 0.90)];
    axisEl.innerHTML = `
        <span>${fmt(minVal)}</span>
        <span>p10 ${fmt(p10)}</span>
        <span>p50 ${fmt(p50)}</span>
        <span>p90 ${fmt(p90)}</span>
        <span>${fmt(maxVal)}</span>
    `;

    // Tooltip on hover
    const tooltip = document.getElementById("monte-tooltip");
    canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (W / rect.width);
        const binIdx = Math.min(Math.floor(x / barW), BINS - 1);
        const price = minVal + (binIdx + 0.5) * binSize;
        const pct = ((bins[binIdx] / N) * 100).toFixed(2);
        tooltip.style.opacity = "1";
        tooltip.style.left = e.clientX - rect.left + "px";
        tooltip.style.top = "0px";
        tooltip.textContent = `${fmt(price)}  —  ${pct}% of simulations`;
    });
    canvas.addEventListener("mouseleave", () => {
        tooltip.style.opacity = "0";
    });


async function loadComparables(score_band, medium, decade, title) {
    const wrap = document.getElementById("comp-wrap");
    if (!wrap) return;
    wrap.innerHTML = '<div class="comp-loading">Loading comparable sales...</div>';
    try {
        const r = await apiFetch("/api/comparables", "POST", {
            score_band, medium, decade, title
        });
        const data = await r.json();
        if (!data.comparables || data.comparables.length === 0) {
            wrap.innerHTML = '<div class="comp-loading">No comparable sales found.</div>';
            return;
        }
        let rows = data.comparables.map(c => `
            <tr>
                <td><em>${c.title}</em></td>
                <td>${c.artist}</td>
                <td>${c.decade ? c.decade + "s" : "—"}</td>
                <td>${c.medium || "—"}</td>
                <td class="comp-price">${fmt(c.sale_price_usd)}</td>
                <td>${c.sale_year || "—"}</td>
            </tr>
        `).join("");
        wrap.innerHTML = `
            <table class="comp-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Artist</th>
                        <th>Decade</th>
                        <th>Medium</th>
                        <th>Sale Price</th>
                        <th>Year</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
        `;
    } catch(e) {
        wrap.innerHTML = '<div class="comp-loading">Could not load comparables.</div>';
    }
}


async function loadPortfolio() {
    const r = await apiFetch("/api/portfolio");
    const data = await r.json();
    const list = document.getElementById("portfolio-list");
    const empty = document.getElementById("portfolio-empty");
    const total = document.getElementById("portfolio-total");

    if (!data.portfolio || data.portfolio.length === 0) {
        list.innerHTML = "";
        empty.style.display = "block";
        total.textContent = "—";
        return;
    }
    empty.style.display = "none";
    total.textContent = fmt(data.total_value);
    list.innerHTML = data.portfolio.map(item => `
        <div class="portfolio-item" id="pitem-${item.id}">
            <div class="portfolio-item-info">
                <div class="portfolio-item-title">${item.title}</div>
                <div class="portfolio-item-artist">${item.artist || "Unknown artist"} ${item.decade ? "· " + item.decade + "s" : ""} ${item.medium ? "· " + item.medium : ""}</div>
            </div>
            <div>
                <div class="portfolio-item-price">${fmt(item.estimated_price_usd)}</div>
                <div class="portfolio-item-range">${fmt(item.confidence_low)} — ${fmt(item.confidence_high)}</div>
            </div>
            <button class="portfolio-delete" onclick="deletePortfolioItem(${item.id})" title="Remove">✕</button>
        </div>
    `).join("");
}

async function deletePortfolioItem(id) {
    await apiFetch("/api/portfolio/" + id, "DELETE");
    document.getElementById("pitem-" + id)?.remove();
    loadPortfolio();
}

async function addToPortfolio(d) {
    await apiFetch("/api/portfolio", "POST", {
        title: d.artwork.title,
        artist: d.artwork.artist,
        medium: d.artwork.medium,
        decade: d.artwork.decade,
        width_cm: d.artwork.width_cm,
        height_cm: d.artwork.height_cm,
        wiki_url: d.artwork.url,
        estimated_price_usd: d.estimated_price_usd,
        confidence_low: d.confidence_interval[0],
        confidence_high: d.confidence_interval[1],
        artist_score: d.artist_score,
    });
    showToast("Added to portfolio");
}

function showToast(msg) {
    let t = document.getElementById("toast");
    if (!t) {
        t = document.createElement("div");
        t.id = "toast";
        t.style.cssText = "position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--parchment);font-family:var(--mono);font-size:0.62rem;letter-spacing:0.12em;padding:10px 24px;z-index:999;opacity:0;transition:opacity 0.3s";
        document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = "1";
    setTimeout(() => { t.style.opacity = "0"; }, 2500);
}


let imageB64 = null;
let identifiedWikiUrl = null;

function handleImageFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        imageB64 = e.target.result;
        document.getElementById("img-preview").src = imageB64;
        document.getElementById("img-preview-wrap").style.display = "block";
        document.getElementById("img-upload-prompt").style.display = "none";
        document.getElementById("img-identified-wrap").style.display = "none";
        document.getElementById("img-error").style.display = "none";
    };
    reader.readAsDataURL(file);
}

// Drag and drop
document.addEventListener("DOMContentLoaded", () => {
    const zone = document.getElementById("img-drop-zone");
    if (!zone) return;
    zone.addEventListener("dragover", (e) => { e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", (e) => {
        e.preventDefault();
        zone.classList.remove("dragover");
        const file = e.dataTransfer.files[0];
        if (file) {
            const input = document.getElementById("img-file-input");
            const dt = new DataTransfer();
            dt.items.add(file);
            input.files = dt.files;
            handleImageFile(input);
        }
    });
});

async function runImageEstimate() {
    if (!imageB64) {
        showError("Please upload an image first.");
        return;
    }
    const btn = document.getElementById("estimate-btn");
    btn.disabled = true;
    btn.textContent = "IDENTIFYING...";
    document.getElementById("img-error").style.display = "none";

    try {
        const r = await apiFetch("/api/identify-image", "POST", { image_b64: imageB64 });
        const data = await r.json();

        if (data.error) {
            throw new Error(data.error);
        }

        if (!data.wiki_url || data.confidence === "low") {
            document.getElementById("img-error").textContent = "Could not identify this artwork. Please try a clearer image or use the Wikipedia URL tab.";
            document.getElementById("img-error").style.display = "block";
            btn.disabled = false;
            btn.textContent = "ESTIMATE";
            return;
        }

        // Show identification result
        document.getElementById("img-title").textContent = data.title || "Unknown";
        document.getElementById("img-artist").textContent = data.artist || "Unknown artist";
        const confEl = document.getElementById("img-confidence");
        confEl.textContent = data.confidence;
        confEl.className = "img-confidence-" + (data.confidence === "high" ? "high" : "low");
        document.getElementById("img-identified-wrap").style.display = "block";
        identifiedWikiUrl = data.wiki_url;

        // Now run the estimate with the identified wiki URL
        btn.textContent = "ESTIMATING...";
        const estR = await apiFetch("/api/estimate", "POST", { url: data.wiki_url });
        const estData = await estR.json();
        if (estData.error) throw new Error(estData.error);
        renderResult(estData);

    } catch(e) {
        document.getElementById("img-error").textContent = "Error: " + e.message;
        document.getElementById("img-error").style.display = "block";
    }

    btn.disabled = false;
    btn.textContent = "ESTIMATE";
}
